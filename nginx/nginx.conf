# ══════════════════════════════════════════════════
# IOR Gestão Pro — Nginx como Load Balancer
# Distribui entre múltiplas instâncias da API
# Rate limiting, SSL, compressão, cache
# ══════════════════════════════════════════════════
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Oculta versão do nginx
    server_tokens off;

    # Logging seguro (sem dados sensíveis na URL)
    log_format secure '$remote_addr - $remote_user [$time_local] '
                      '"$request_method $uri" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log secure;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Rate limiting global por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:1m  rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Cache proxy
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m
                     max_size=100m inactive=60m use_temp_path=off;

    # ── Upstream: API em cluster (múltiplas réplicas)
    # Docker Swarm/Compose resolve "api" para todas as réplicas automaticamente
    upstream api_cluster {
        least_conn;                    # balanceia para o servidor com menos conexões
        server api:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;                  # pool de conexões persistentes
    }

    # ── HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS principal
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN_NAME:-localhost};

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Headers de segurança
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Limite de conexões por IP
        limit_conn conn_limit 20;

        # ── API routes — com rate limiting e proxy
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";           # HTTP/1.1 keepalive
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;

            # Cache para GETs (listas)
            proxy_cache api_cache;
            proxy_cache_valid 200 30s;
            proxy_cache_methods GET;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Rate limit extra para autenticação
        location /api/auth/ {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Frontend estático
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
        }

        # Bloqueia arquivos sensíveis
        location ~ /\.(env|git|htaccess|bak) { deny all; return 404; }
    }
}
