apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ior-ingress
  namespace: ior-gestao
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "30"
    nginx.ingress.kubernetes.io/rate-limit-burst-multiplier: "5"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - app.iorreflexologia.com.br
    secretName: ior-tls
  rules:
  - host: app.iorreflexologia.com.br
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ior-api-service
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ior-frontend-service
            port:
              number: 80
