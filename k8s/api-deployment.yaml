apiVersion: apps/v1
kind: Deployment
metadata:
  name: ior-api
  namespace: ior-gestao
  labels:
    app: ior-api
spec:
  replicas: 3                         # começa com 3 pods
  selector:
    matchLabels:
      app: ior-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0               # zero downtime deploy
  template:
    metadata:
      labels:
        app: ior-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: api
        image: ghcr.io/rohmvieira/ior-gestao-pro/api:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: ior-config
        - secretRef:
            name: ior-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ior-api-service
  namespace: ior-gestao
spec:
  selector:
    app: ior-api
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
